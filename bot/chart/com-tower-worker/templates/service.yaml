apiVersion: v1
kind: Service
metadata:
  name: {{ include "cw.fullname" . }}
  labels: {{- include "cw.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "cw.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
