name: Deploy Worker to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # needed for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy worker to Cloud Run
        working-directory: worker
        env:
          PROJECT_ID: com-tower
          REGION: us-central1
          SECRET_FIREBASE_PROJECT_ID: ${{ secrets.SECRET_FIREBASE_PROJECT_ID }}
          SECRET_FIREBASE_CLIENT_EMAIL: ${{ secrets.SECRET_FIREBASE_CLIENT_EMAIL }}
          SECRET_FIREBASE_PRIVATE_KEY: ${{ secrets.SECRET_FIREBASE_PRIVATE_KEY }}
          SECRET_SIGNAL_CLI_URL: ${{ secrets.SECRET_SIGNAL_CLI_URL }}
          SECRET_SIGNAL_BOT_NUMBER: ${{ secrets.SECRET_SIGNAL_BOT_NUMBER }}
          SECRET_NOTIFY_RENDER_URL: ${{ secrets.SECRET_NOTIFY_RENDER_URL }}
          SECRET_RENDER_BYPASS_TOKEN: ${{ secrets.SECRET_RENDER_BYPASS_TOKEN }}
        run: sh ./deploy.sh
